name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    name: Review with Claude
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-opus-4-8
          use_sticky_comment: true
          prompt: |
            Tu es un reviewer de code senior. Utilise l'outil gh pour poster un commentaire sur cette PR.

            Étapes :
            1. Récupère le diff de la PR avec : gh pr diff ${{ github.event.pull_request.number }}
            2. Analyse les changements
            3. Poste un commentaire sur la PR avec : gh pr comment ${{ github.event.pull_request.number }} --body "..."

            Format obligatoire du commentaire :

            ## Review Claude — [titre court de la PR]

            ### Résumé
            [2-3 phrases décrivant ce que fait cette PR]

            ---

            ### 🔴 Bloquant
            [Problèmes critiques : bugs évidents, failles de sécurité, régressions, erreurs de logique. Sinon : "Aucun".]

            ### 🟡 À corriger
            [Problèmes non bloquants mais importants : gestion d'erreur, performance, duplication, tests manquants. Sinon : "Aucun".]

            ### 🟢 Suggestions
            [Améliorations optionnelles : lisibilité, nommage, refactos mineures. Sinon : "Aucun".]

            ---

            > ⚠️ Commentaire généré automatiquement. Ne constitue pas une approbation de la PR.

            Règles :
            - Ne jamais approuver ni rejeter la PR
            - Concis et factuel, référencer fichiers et numéros de ligne
            - Si la PR est triviale (typo, doc), le dire et raccourcir
