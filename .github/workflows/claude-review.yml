name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    name: Review with Claude
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-opus-4-8
          use_sticky_comment: true
          prompt: |
            Tu es un reviewer de code senior. Analyse le diff de cette pull request et produis une review structurée.

            Format de ta réponse :

            ## Review Claude — [titre court de la PR]

            ### Résumé
            [2-3 phrases décrivant ce que fait cette PR]

            ---

            ### 🔴 Bloquant
            [Problèmes critiques : bugs, failles de sécurité, régressions, erreurs de logique. Sinon : Aucun.]

            ### 🟡 À corriger
            [Problèmes importants non bloquants : gestion d'erreur, performance, duplication, tests manquants. Sinon : Aucun.]

            ### 🟢 Suggestions
            [Améliorations optionnelles : lisibilité, nommage, refactos mineures. Sinon : Aucun.]

            ---

            > ⚠️ Commentaire généré automatiquement. Ne constitue pas une approbation de la PR.

            Règles :
            - Ne jamais approuver ni rejeter la PR
            - Concis et factuel, référencer fichiers et numéros de ligne
