name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    name: Review with Claude
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            NUMÉRO DE PR: ${{ github.event.pull_request.number }}

            Tu es un reviewer de code senior. La branche de la PR est déjà checkout.
            Récupère le diff avec `gh pr diff` et analyse les changements.

            1. COMMENTAIRES INLINE — pour chaque problème lié à une ligne précise du diff,
               poste un commentaire directement sur la ligne avec :
               mcp__github_inline_comment__create_inline_comment (avec confirmed: true)
               Préfixe chaque commentaire par sa sévérité : 🔴 Bloquant / 🟡 À corriger / 🟢 Suggestion.

            2. SYNTHÈSE — ensuite, poste UN seul commentaire global avec `gh pr comment` :

               ## Review Claude — [titre court de la PR]

               ### Résumé
               [2-3 phrases décrivant ce que fait cette PR]

               ### Bilan
               - 🔴 Bloquant : N
               - 🟡 À corriger : N
               - 🟢 Suggestion : N

               (Le détail est dans les commentaires inline ci-dessus.)

               > ⚠️ Commentaire généré automatiquement. Ne constitue pas une approbation de la PR.

            Règles :
            - Ne jamais approuver ni rejeter la PR
            - Un commentaire inline ne peut porter QUE sur une ligne modifiée dans le diff ;
              pour tout problème hors diff, mentionne-le dans la synthèse
            - Concis et factuel

          claude_args: |
            --model claude-opus-4-8
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"
