name: Claude Code

# Répond aux mentions "@claude" dans les commentaires de PR.
# (Note : sur GitHub un commentaire de PR arrive via l'event "issue_comment" ;
#  le garde "github.event.issue.pull_request" exclut les vraies issues — non utilisées,
#  suivi sur ClickUp.)
#
# Deux jobs aiguillés par le contenu du commentaire :
#   - "@claude review / relis / relecture"  → job "review"  (Opus, plugin /code-review)
#   - "@claude <autre demande>"             → job "assist"  (Sonnet, mode interactif)
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}-${{ github.actor }}
  cancel-in-progress: true

jobs:
  # Review de PR à la demande — qualité max (Opus) + plugin de review.
  review:
    name: Review (Opus)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
        github.event_name == 'pull_request_review_comment'
      ) &&
      contains(github.event.comment.body, '@claude') &&
      (
        contains(github.event.comment.body, 'review') ||
        contains(github.event.comment.body, 'relis') ||
        contains(github.event.comment.body, 'relecture')
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@0cb4f3e5e764d2e00407d29b6bf0aa9df0976d88 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number || github.event.pull_request.number }}"
          claude_args: |
            --model claude-opus-4-8
            --max-turns 25

  # Demande libre (question, fix, implémentation) — Sonnet, moins cher.
  assist:
    name: Assist (Sonnet)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
        github.event_name == 'pull_request_review_comment'
      ) &&
      contains(github.event.comment.body, '@claude') &&
      !(
        contains(github.event.comment.body, 'review') ||
        contains(github.event.comment.body, 'relis') ||
        contains(github.event.comment.body, 'relecture')
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Run Claude Code
        uses: anthropics/claude-code-action@0cb4f3e5e764d2e00407d29b6bf0aa9df0976d88 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 15
